name: bot_showcase

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      # Путь к ключу внутри контейнера
      - GOOGLE_APPLICATION_CREDENTIALS=/home/node/creds/google-creds.json
      # Бери значение из .env (не хардкодь в compose)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      # Пробрасываем только файл ключа, а не всю папку
      - ./google-creds.json:/home/node/creds/google-creds.json:ro

volumes:
  qdrant_data:
  n8n_data:
